name: rigoula_smart_farming
description: "Flutter app pour Rigoula"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.10.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^3.6.0
  firebase_database: ^11.1.4
  cupertino_icons: ^1.0.8
  speech_to_text:
  firebase_messaging: ^15.1.4


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.6


flutter:
  uses-material-design: true
  assets:
    - assets/rigoula.png
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/rigoula.png"
  min_sdk_android: 

flutter_native_splash:
  color: "#E8F5E9"
  image: assets/rigoula.png
  android: true
  ios: true
  android_12:
    image: assets/rigoula.png
    color: "#E8F5E9"